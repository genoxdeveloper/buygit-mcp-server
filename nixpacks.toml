# Nixpacks build configuration for @buygit/mcp-server.
# Railway uses nixpacks by default; this file pins the Node version
# and sets the install + build commands.

[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages_latest.pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "node dist/index.js"
